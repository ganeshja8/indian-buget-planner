<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Calculator - Indian Budget Planner</title>
    <style>
        /* Base Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Calculator Container */
        .calculator-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 24px;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #4a4a4a;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            color: #333;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: #2563eb;
        }

        /* Calculate Button */
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        /* Results Box */
        .results-container {
            background-color: #f3f4f6;
            padding: 20px;
            border-radius: 12px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 15px;
            color: #4b5563;
        }

        .result-row span:last-child {
            font-weight: 600;
            color: #111827;
        }

        .final-amount {
            margin-bottom: 0;
            padding-top: 15px;
            border-top: 1px solid #e5e7eb;
            font-size: 18px;
            color: #111827;
        }

        .final-amount span:last-child {
            color: #059669;
            font-size: 22px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h2>SIP Calculator</h2>
        
        <div class="input-group">
            <label for="monthly-investment">Monthly Investment (₹)</label>
            <input type="number" id="monthly-investment" value="5000" min="500">
        </div>
        
        <div class="input-group">
            <label for="expected-return">Expected Return Rate (% p.a)</label>
            <input type="number" id="expected-return" value="12" min="1" step="0.1">
        </div>
        
        <div class="input-group">
            <label for="time-period">Time Period (Years)</label>
            <input type="number" id="time-period" value="10" min="1">
        </div>

        <button onclick="calculateSIP()">Calculate Returns</button>

        <div class="results-container">
            <div class="result-row">
                <span>Invested Amount</span>
                <span id="invested-amount">₹0</span>
            </div>
            <div class="result-row">
                <span>Est. Returns</span>
                <span id="est-returns">₹0</span>
            </div>
            <div class="result-row final-amount">
                <span>Total Value</span>
                <span id="total-value">₹0</span>
            </div>
        </div>
    </div>

    <script>
        // Indian Rupee Formatter
        const formatter = new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR',
            maximumFractionDigits: 0
        });

        function calculateSIP() {
            // Get input values
            const monthlyInvestment = parseFloat(document.getElementById('monthly-investment').value);
            const annualInterestRate = parseFloat(document.getElementById('expected-return').value);
            const years = parseFloat(document.getElementById('time-period').value);

            // Validation check
            if (isNaN(monthlyInvestment) || isNaN(annualInterestRate) || isNaN(years) || 
                monthlyInvestment <= 0 || annualInterestRate <= 0 || years <= 0) {
                alert("Please enter valid numbers");
                return;
            }

            // Calculation logic
            const monthlyRate = annualInterestRate / 12 / 100;
            const months = years * 12;

            // SIP Formula
            const totalValue = monthlyInvestment * ((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate) * (1 + monthlyRate);
            const totalInvested = monthlyInvestment * months;
            const estimatedReturns = totalValue - totalInvested;

            // Update UI with formatted values
            document.getElementById('invested-amount').innerText = formatter.format(totalInvested);
            document.getElementById('est-returns').innerText = formatter.format(estimatedReturns);
            document.getElementById('total-value').innerText = formatter.format(totalValue);
        }

        // Run calculation automatically when the page loads
        window.onload = calculateSIP;
    </script>

</body>
</html>
